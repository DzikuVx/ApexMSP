sentence=MSP v2 (MultiWii Serial Protocol) client library for INAV & Betaflight flight controllers. Based on original MSP library by Fabrizio Di Vittorio.
paragraph=Provides send/receive primitives over any Arduino Stream, plus higher-level request/command helpers and INAV-specific payload structures. Supports all MSP v2 frame IDs defined by INAV including telemetry, GPS, attitude, PID, waypoints, and RC channels.
